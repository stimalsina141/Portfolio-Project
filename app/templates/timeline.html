{% extends "base.html" %}

{% block content %}
<div class="timeline-container">
    <h1>Timeline</h1>

    <!-- Form to add a new timeline post -->
    <form id="timeline-form">
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="content">Content</label>
            <textarea id="content" name="content" rows="4" required></textarea>
        </div>
        <button type="submit">Post</button>
    </form>

    <!-- Container for timeline posts -->
    <div id="posts-container">
        <h2>Posts</h2>
        <div id="posts-list"></div>
    </div>
</div>

<script>
    // Function to fetch and display posts
    async function loadPosts() {
        const response = await fetch('/api/timeline_post');
        const data = await response.json();
        const postsList = document.getElementById('posts-list');
        postsList.innerHTML = '';
        data.timeline_posts.forEach(post => {
            const postDiv = document.createElement('div');
            postDiv.className = 'timeline-post';
            postDiv.innerHTML = `
                <h3>${post.name}</h3>
                <p>${post.content}</p>
                <small>${post.created_at}</small>
            `;
            postsList.appendChild(postDiv);
        });
    }

    // Handle form submission
    document.getElementById('timeline-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const formData = new FormData(e.target);
        const response = await fetch('/api/timeline_post', {
            method: 'POST',
            body: formData
        });

        if (response.ok) {
            e.target.reset();
            loadPosts(); // Reload posts after adding a new one
        }
    });

    // Load posts on page load
    loadPosts();
</script>
{% endblock %}
